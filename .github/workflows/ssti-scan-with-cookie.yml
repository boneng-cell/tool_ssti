name: SSTI Scan WITH Cookie

on:
  workflow_dispatch:
    inputs:
      url_base64:
        description: 'Base64 encoded url.txt file'
        required: true
        type: string
      cookie_base64:
        description: 'Base64 encoded cookie string'
        required: true
        type: string

jobs:
  scan:
    name: Run SSTI Scanner with Cookie
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Decode URL list from Base64
        id: decode_url
        run: |
          echo "${{ github.event.inputs.url_base64 }}" | base64 --decode > url.txt
          echo "URL count: $(wc -l < url.txt)"
          echo "First few URLs:"
          head -3 url.txt
      
      - name: Decode Cookie from Base64
        id: decode_cookie
        run: |
          echo "${{ github.event.inputs.cookie_base64 }}" | base64 --decode > cookie.txt
          COOKIE=$(cat cookie.txt)
          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT
          # Hapus file cookie untuk keamanan
          rm cookie.txt
      
      - name: Run SSTI Scanner with Cookie
        run: |
          python ssti_scanner.py -l url.txt -c "${{ steps.decode_cookie.outputs.cookie }}" -o hasil.txt
      
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: ssti-scan-results-with-cookie
          path: hasil.txt
          retention-days: 30
      
      - name: Display Results Summary
        if: always()
        run: |
          if [ -f hasil.txt ]; then
            echo "=== SCAN RESULTS ==="
            cat hasil.txt
            echo "===================="
          else
            echo "No results file found"
          fi
