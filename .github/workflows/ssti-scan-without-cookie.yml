name: SSTI Scan WITHOUT Cookie

on:
  workflow_dispatch:
    inputs:
      url_file:
        description: 'Temporary filename for url.txt in repo'
        required: true
        type: string

jobs:
  scan:
    name: Run SSTI Scanner without Cookie
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download URL list from repo
        run: |
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o url.txt \
               "https://api.github.com/repos/${{ github.repository }}/contents/${{ github.event.inputs.url_file }}"
          echo "URL count: $(wc -l < url.txt)"
          echo "First few URLs:"
          head -3 url.txt
      
      - name: Run SSTI Scanner without Cookie
        run: |
          python ssti_scanner.py -l url.txt -o hasil.txt
      
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: ssti-scan-results-without-cookie
          path: hasil.txt
          retention-days: 30
      
      - name: Display Results Summary
        if: always()
        run: |
          if [ -f hasil.txt ]; then
            echo "=== SCAN RESULTS ==="
            cat hasil.txt
            echo "===================="
          else
            echo "No results file found"
          fi
      
      - name: Cleanup temp files
        if: always()
        run: |
          curl -X DELETE \
               -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/repos/${{ github.repository }}/contents/${{ github.event.inputs.url_file }}" \
               -d '{"message":"Cleanup after scan","sha":"${{ steps.get_sha.outputs.sha }}"}' || true
